# ------------------------------------------------------------------------------------
# WSO2 Integrator: MI - Local Testing Configuration
# ------------------------------------------------------------------------------------
# This file contains minimal configurations for deploying WSO2 Integrator: MI
# on a local Kubernetes cluster (e.g., Minikube, Kind, Docker Desktop).
#
# For detailed configuration options, refer to:
#   - mi/values_full.yaml (complete reference)
#   - mi/CONFIG.md (generated documentation)
#   - https://github.com/wso2/helm-mi
# ------------------------------------------------------------------------------------

# -- Container registry (When running on a local Kubernetes cluster using local image, make this empty)
containerRegistry: "wso2"

wso2:
  subscription:
    # -- WSO2 subscription username
    username: ""
    # -- WSO2 subscription password
    password: ""
  ingress:
    # -- Enable Ingress for MI
    enabled: false
    # -- Ingress class name
    ingressClassName: "nginx"
    # -- (list) Ingress annotations
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    # -- K8s TLS secret for configured hostname
    tlsSecret: ""
    ratelimit:
      # -- Ingress rate limit
      enabled: false
      # -- Ingress ratelimit zone name
      zoneName: ""
      # -- Ingress ratelimit burst limit
      burstLimit: ""
      # -- Enable Ingress for metrics
    metrics:
      annotations:
        nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  gatewayAPI:
    # -- Enable Gateway API resources
    enabled: true
    # -- Create a Gateway resource (set to false if using a shared/external Gateway)
    # -- gatewayName and gatewayNamespace values defined below are used in creating the new Gateway.
    createGateway: true
    # -- GatewayClass name (must exist in cluster)
    gatewayClassName: "envoy"
    # -- Name of the Gateway resource
    gatewayName: "wso2-gateway-mi"
    # -- Namespace of the Gateway resource
    gatewayNamespace: "default"
    # TLS secret for Gateway HTTPS listener
    # If tlsSecret is empty, a self-signed TLS certificate will be generated automatically for local/dev use.
    # MANDATORY : For production, provide a cert-manager managed secret via tlsSecret.
    tlsSecret: ""       # K8s TLS secret for configured hostname (if set, disables auto-generation)
    # HTTP Listener
    httpListener:
      # -- Enable HTTP listener on port 80. Set to true for local development.
      enabled: true
    # Rate Limiting (Modern Policy-driven)
    ratelimit:
      enabled: false
      requestsPerSecond: 10
    # Backend TLS (Replaces backend-protocol: "HTTPS" annotation)
    backendTLS:
      enabled: true
      hostname: "localhost"
      # -- ConfigMap containing ca.crt for backend TLS verification (empty = use bundled cert)
      caCertConfigMap: ""
  config:
    # -- Port offset for Micro Integrator (https://apim.docs.wso2.com/en/latest/install-and-setup/setup/deployment-best-practices/changing-the-default-ports-with-offset/#changing-the-default-mi-ports)
    portOffset: 10
    admin:
      # -- Super admin username
      username: ""
      # -- Super admin password
      password: ""
      # -- Create super admin account
      createAdminAccount: false
    userstore:
      file:
        # -- Enable/Disable file based userstore
        enabled: true
    secureVault:
      # -- Enable/Disable secure vault
      enabled: false
    keyStore:
      primary:
        # -- Primary keystore file name
        fileName: "wso2carbon.jks"
        # -- Primary keystore alias
        alias: "wso2carbon"
        # -- Primary keystore password
        password: "wso2carbon"
        # -- Primary keystore key password
        keyPassword: "wso2carbon"
      internal:
        # -- Internal keystore file name
        fileName: "wso2carbon.jks"
        # -- Internal keystore alias
        alias: "wso2carbon"
        # -- Internal keystore password
        password: "wso2carbon"
        # -- Internal keystore key password
        keyPassword: "wso2carbon"
    trustStore:
      primary:
        # -- Primary truststore file name
        fileName: "client-truststore.jks"
        # -- Primary truststore password
        password: "wso2carbon"
    # -- ICP 2.0 configuration for connecting MI to the Integration Control Plane
    icp:
      # -- Enable ICP connectivity
      enabled: false
      # -- Runtime ID (If not defined Pod UID will be used as runtime ID)
      runtime: ""
      # -- Environment name
      environment: ""
      # -- Project name
      project: ""
      # -- Integration name
      integration: ""
      # -- Secret key (obtained from ICP)
      secret: ""
      # -- ICP server URL
      # icpUrl: "https://icp-server:9445"
  deployment:
    securityContext:
      # -- Enable/Disable AppArmor (https://kubernetes.io/docs/tutorials/security/apparmor/)
      apparmor: false
      # -- Enable/Disable seccomp profile (https://kubernetes.io/docs/tutorials/security/seccomp/)
      seccompProfile:
        enabled: false
      # -- Enable/Disable runAsUser
      enableRunAsUser: false
      # -- The UID to run the entrypoint of the container process
      runAsUser: "10802"
      # -- Enable/Disable runAsGroup/fsGroup
      enableRunAsGroup: false
    nodeSelector: {}
    # Example:
    # nodeSelector:
    #   node-role.kubernetes.io/worker: ""
    #   topology.kubernetes.io/zone: "eastus-1"
    # -- Hostname of the Micro Integrator deployment
    hostname: "mi.wso2.com"
    # -- Build version of the Micro Integrator
    BuildVersion: "4.6.0"
    # -- K8s secret name which contains JKS files
    JKSSecretName: ""
    # -- imagePullSecrets for private docker registry
    imagePullSecrets: ""
    image:
      # -- Container image repository name
      repository: "wso2mi"
      # -- Container image digest
      digest: ""
      # -- Container image tag
      tag: "4.6.0"
      # -- Container image pull policy. Refer (https://kubernetes.io/docs/concepts/containers/images/#updating-images)
      pullPolicy: IfNotPresent

    # -- Kubernetes Probes (https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
    probes:
      # -- Startup probe executed prior to Liveness Probe taking over
      startup:
        # -- Number of seconds after the container has started before startup probes are initiated
        initialDelaySeconds: 5
        # -- How often (in seconds) to perform the probe
        periodSeconds: 3
        # -- Number of attempts
        failureThreshold: 40
      # -- Indicates whether the container is running
      liveness:
        # -- How often (in seconds) to perform the probe
        periodSeconds: 10
        # -- Indicates whether the container is ready to service requests
      readiness:
        # -- Number of seconds after the container has started before readiness probes are initiated
        initialDelaySeconds: 60
        # -- How often (in seconds) to perform the probe
        periodSeconds: 1

    # -- Number of deployment replicas
    replicas: 1
    # -- Horizontal Pod Autoscaler (HPA) configurations (https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/)
    hpa:
      # -- Enable/Disable Horizontal Pod Autoscaler (HPA)
      enabled: false
      # -- Min replica count for HPA
      minReplicas: 1
      # -- Max replica count for HPA
      maxReplicas: 2
      # -- Average CPU utilization percentage for HPA
      cpuUtilizationPercentage: 75
      # -- Average memory utilization percentage for HPA
      memoryUtilizationPercentage: 75
    # -- Pod disruption budget configurations (https://kubernetes.io/docs/tasks/run-application/configure-pdb/)
    pdb:
      # -- Enable/Disable pod disruption budget
      enabled: false
      # -- Min available pods for pod disruption budget
      minAvailable: 1

    strategy:
      rollingUpdate:
        # -- The maximum number of pods that can be scheduled above the desired number of pods.
        maxSurge: 1
        # -- The maximum number of pods that can be unavailable during the update.
        maxUnavailable: 0

    # These are the minimum resource recommendations for running WSO2 Micro Integrator
    resources:
      requests:
        # -- The minimum amount of memory that should be allocated for a Pod
        memory: "512Mi"
        # -- The minimum amount of CPU that should be allocated for a Pod
        cpu: "500m"
      limits:
        # -- The maximum amount of memory that should be allocated for a Pod
        memory: "1Gi"
        # -- The maximum amount of CPU that should be allocated for a Pod
        cpu: "1000m"

      # JVM settings
      # These are the resource allocation configurations associated with the JVM
      jvm:
        memory:
          # -- The minimum amount of memory that should be allocated for the JVM
          xms: "512m"
          # -- The maximum amount of memory that should be allocated for the JVM
          xmx: "1024m"

    # -- (list) Environment variables for the Micro integrator deployment
    envs:
    # wso2_oh_sample_baseUrl: "http://localhost:8290/services/odata"

    # Configure synapse testing
    synapseTest:
      # -- Enable/Disable synapse testing
      enabled: false
    configMaps:
      entryPoint:
        defaultMode: "0755"
