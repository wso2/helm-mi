apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-mi-httproute
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "micro-integrator.labels" . | indent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.wso2.gatewayAPI.gatewayName }}
      namespace: {{ .Values.wso2.gatewayAPI.gatewayNamespace | default "default" }}
  hostnames:
    - {{ .Values.wso2.deployment.hostname | quote }}
  rules:
    # 1. Management API (Port 9164) - HTTPS backend
    - matches:
        - path:
            type: PathPrefix
            value: /management
      backendRefs:
        - name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-https
          port: {{ add 9164 .Values.wso2.config.portOffset -10 }}
    # 2. Health endpoint (Port 9201) - HTTP backend
    - matches:
        - path:
            type: Exact
            value: /healthz
      backendRefs:
        - name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-http
          port: {{ add 9201 .Values.wso2.config.portOffset -10 }}
    # 3. Metrics endpoint (Port 9201) - HTTP backend
    - matches:
        - path:
            type: PathPrefix
            value: /metric-service/metric
      backendRefs:
        - name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-http
          port: {{ add 9201 .Values.wso2.config.portOffset -10 }}
    # 4. Main Integration Service (Port 8253) - HTTPS backend - must be last due to catch-all
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-https
          port: {{ add 8253 .Values.wso2.config.portOffset -10 }}
{{- end }}
