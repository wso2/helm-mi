# ReferenceGrant allows the external Gateway to access the TLS secret in this namespace
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-tls-grant
  namespace: {{ .Release.Namespace }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: {{ .Values.wso2.gatewayAPI.gatewayNamespace }}
  to:
    - group: ""
      kind: Secret
      name: {{ .Values.wso2.gatewayAPI.tlsSecret }}
{{- end }}
