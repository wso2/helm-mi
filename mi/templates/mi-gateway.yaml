apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.wso2.gatewayAPI.gatewayName }}
  namespace: {{ .Values.wso2.gatewayAPI.gatewayNamespace }}
  labels:
{{ include "micro-integrator.labels" . | indent 4 }}
spec:
  gatewayClassName: {{ .Values.wso2.gatewayAPI.gatewayClassName }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: {{ .Values.wso2.deployment.hostname | quote }}
      allowedRoutes:
        namespaces:
          from: All
    {{- $tlsSecretName := .Values.wso2.gatewayAPI.tlsSecret }}
    {{- if not $tlsSecretName }}
      {{- $tlsSecretName = printf "%s-%s-mi-gateway-tls" (include "resource.prefix" .) .Release.Name }}
    {{- end }}
    - name: https
      port: 443
      protocol: HTTPS
      hostname: {{ .Values.wso2.deployment.hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ $tlsSecretName }}
            namespace: {{ .Release.Namespace }}
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
