{{- if .Values.wso2.gatewayAPI.backendTLS.enabled }}
# BackendTLSPolicy: Applies TLS to HTTPS backend service only
# This ensures HTTP endpoints (metrics, health) work without TLS
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-mi-backend-tls
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-https
  validation:
    hostname: {{ .Values.wso2.gatewayAPI.backendTLS.hostname | default "localhost" }}
    caCertificateRefs:
      - name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-mi-backend-ca
        kind: ConfigMap
        group: ""
---
{{- end }}
{{- if and .Values.wso2.gatewayAPI.ratelimit.enabled (eq .Values.wso2.gatewayAPI.gatewayClassName "envoy") }}
# BackendTrafficPolicy: Envoy Gateway only (v1alpha1 schema)
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-mi-ratelimit
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-mi-httproute
  rateLimit:
    local:
      rules:
        - limit:
            requests: {{ .Values.wso2.gatewayAPI.ratelimit.requestsPerSecond }}
            unit: Second
          clientSelectors:
            - sourceCIDR: 0.0.0.0/0
{{- end }}
{{- end }}
