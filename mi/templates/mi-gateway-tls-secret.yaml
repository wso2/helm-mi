# Auto-generated self-signed TLS certificate for Gateway HTTPS listener.
# For production, provide a cert-manager managed secret via tlsSecret.
# Uses Helm lookup to preserve the certificate across helm upgrades.
{{- $secretName := printf "%s-%s-mi-gateway-tls" (include "resource.prefix" .) .Release.Name }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if $existingSecret }}
# Reuse existing certificate to avoid regeneration on helm upgrade
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "micro-integrator.labels" . | indent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ index $existingSecret.data "tls.crt" }}
  tls.key: {{ index $existingSecret.data "tls.key" }}
{{- else }}
# Generate new self-signed certificate (first install)
{{- $cn := .Values.wso2.deployment.hostname }}
{{- $cert := genSelfSignedCert $cn nil (list $cn) 365 }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "micro-integrator.labels" . | indent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
{{- end }}
