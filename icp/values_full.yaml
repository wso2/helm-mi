# ------------------------------------------------------------------------------------
# WSO2 Integration Control Plane (ICP) - Full Configuration
# ------------------------------------------------------------------------------------
# This file contains full configurations for deploying ICP
# on a Kubernetes cluster.
#
# For detailed configuration options, refer to:
#   - icp/CONFIG.md (generated documentation)
#   - https://github.com/wso2/helm-icp
# ------------------------------------------------------------------------------------

# -- Kubernetes cluster provider. Supported values: azure, aws
provider: ""
# -- Container registry
containerRegistry: ""
# AWS service configurations
aws:
  # -- AWS IAM service account name
  serviceAccountName: ""
  # -- AWS region
  region: ""
  # AWS Secret Manager configurations
  secretManager:
    # -- AWS Secret Manager secret provider class name
    secretProviderClass: ""
    secretIdentifiers:
      internalKeystorePassword:
        # -- Secret name for internal keystore password
        secretName: ""
        # -- Secret key for internal keystore password
        secretKey: ""
# Azure service configurations
azure:
  keyVault:
    # -- Name of the target Azure Key Vault instance
    name: ""
    # -- Azure Secret Manager secret provider class name
    secretProviderClass: ""
    secretIdentifiers:
      # -- Secret name for internal keystore password
      internalKeystorePassword: ""
    activeDirectory:
      # -- Service Principal created for transacting with the target Azure Key Vault
      # For advanced details refer to official documentation (https://github.com/Azure/secrets-store-csi-driver-provider-azure/blob/master/docs/service-principal-mode.md)
      servicePrincipal:
        # -- Azure AD application name for fetching secrets via CSI secret store driver
        appId: ""
        # -- Client secret of Azure AD application client
        clientSecret: ""
      # -- Azure Active Directory tenant ID of the target Key Vault
      tenantId: ""
    resourceManager:
      # -- Subscription ID of the target Azure Key Vault
      subscriptionId: ""
      # -- Name of the Azure Resource Group to which the target Azure Key Vault belongs
      resourceGroup: ""
# GCP service configurations
gcp:
  # GCP Secret Manager configurations
  secretManager:
    # -- GCP Secret Manager secret provider class name
    secretProviderClass: ""
    # -- K8s secret name which contains the JSON keyfile for the service account used to access the GCP Secret Manager
    serviceAccountKeySecret: ""
    secretIdentifiers:
      # -- Secret name for internal keystore password. Expected format is `projects/<PROJECT_ID>/secrets/<SECRET_NAME>/versions/<VERSION>`
      internalKeystorePassword: ""
wso2:
  # OpenShift specific configurations
  openshift:
    # -- Enable OpenShift specific configurations
    enabled: false
    route:
      tls:
        # -- TLS termination type: reencrypt, edge, passthrough
        termination: "reencrypt"
        # -- Insecure traffic policy: Redirect, Allow, None
        insecureEdgeTerminationPolicy: "Redirect"
  ingress:
    # -- Enable Ingress for ICP
    enabled: false
    # -- Ingress class name
    ingressClassName: ""
    # -- (list) Ingress annotations
    # ICP serves HTTPS natively; you must configure your ingress controller for backend HTTPS.
    # For NGINX: nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    # For Traefik: traefik.ingress.kubernetes.io/service.serversscheme: "https"
    annotations:
    # -- K8s TLS secret for configured hostname
    tlsSecret: ""
    ratelimit:
      # -- Ingress rate limit
      enabled: false
      # -- Ingress ratelimit zone name
      zoneName: ""
      # -- Ingress ratelimit burst limit
      burstLimit: ""
  gatewayAPI:
    # -- Enable Gateway API resources (set to true to use Gateway API instead of Ingress)
    enabled: true
    # -- Create a Gateway resource (set to false if using a shared/external Gateway)
    # -- gatewayName and gatewayNamespace values defined below are used in creating the new Gateway.
    createGateway: true
    # -- GatewayClass name (must exist in cluster - e.g., envoy for Envoy Gateway)
    gatewayClassName: "envoy"
    # -- Name of the Gateway 
    gatewayName: "envoy"
    # -- Namespace where the Gateway resides 
    gatewayNamespace: "envoy-gateway"
    # -- K8s TLS secret for configured hostname (for Gateway API)
    # TLS secret for Gateway HTTPS listener
    # If tlsSecret is empty, a self-signed TLS certificate will be generated automatically for local/dev use.
    # MANDATORY : For production, provide a cert-manager managed secret via tlsSecret.
    tlsSecret: ""       # K8s TLS secret for configured hostname (if set, disables auto-generation)
    # HTTP Listener
    httpListener:
      # -- Enable HTTP listener on port 80. Disable for production to only expose HTTPS.
      enabled: false
    # Rate Limiting
    ratelimit:
      # -- Enable Gateway API rate limiting
      enabled: false
      # -- Requests per second limit
      requestsPerSecond: 10
    # Backend TLS (ICP serves all content over HTTPS)
    backendTLS:
      # -- Enable backend TLS policy
      enabled: false
      # -- Hostname to validate against the backend's TLS certificate CN/SAN (must match the CN in your keystore)
      hostname: "localhost"
      # -- ConfigMap containing ca.crt for backend TLS verification.
      # When empty, the chart creates a ConfigMap from the bundled backend-ca.crt file.
      # Set this when using a custom keystore (e.g. via JKSSecretName) so the CA matches.
      caCertConfigMap: ""
    # Session Affinity (cookie-based sticky sessions via Envoy Gateway)
    # Activate when running ICP with multiple replicas (replicas > 1).
    # ICP uses server-side HTTP sessions for dashboard login state, CSRF tokens,
    # and SSO flow state. Without session affinity, users may get logged out or
    # encounter CSRF errors when requests land on different pods.
    # Not needed for single-replica deployments.
    sessionAffinity:
      # -- Name of the affinity cookie set by Envoy Gateway
      cookieName: "ICP_AFFINITY"
      # -- TTL of the affinity cookie (e.g., 3600s = 1 hour)
      cookieTTL: "3600s"
  deployment:
    securityContext:
      # -- Enable/Disable AppArmor (https://kubernetes.io/docs/tutorials/security/apparmor/)
      apparmor: true
      # -- Enable/Disable seccomp profile (https://kubernetes.io/docs/tutorials/security/seccomp/)
      seccompProfile:
        # -- Enable/Disable seccomp profile
        enabled: true
        # -- Seccomp profile type
        type: RuntimeDefault
      enableRunAsUser: true
      # -- The UID to run the entrypoint of the container process
      runAsUser: "10802"
      seLinux:
        # -- Enable SELinux MCS (Multi-Category Security) labels on pods. Enable on RHEL/CentOS nodes with SELinux enforcing.
        enabled: false
        # -- MCS label: s0=sensitivity, c26,c0=categories. Isolates pod file access to matching labels only.
        level: "s0:c26,c0"
    # -- Hostname of the ICP deployment
    hostname: ""
    # -- Build version of the ICP
    BuildVersion: "2.0.0"
    # -- K8s secret name which contains JKS files
    JKSSecretName: ""
    # -- Image pull secrets for pulling the container image from a private registry
    imagePullSecrets: ""
    image:
      # -- Container image repository name
      repository: ""
      # -- Container image digest
      digest: ""
      # -- Container image pull policy. Refer (https://kubernetes.io/docs/concepts/containers/images/#updating-images)
      pullPolicy: Always

    # -- Kubernetes Probes (https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
    probes:
      # -- Startup probe executed prior to Liveness Probe taking over
      startup:
        # -- Number of seconds after the container has started before startup probes are initiated
        initialDelaySeconds: 5
        # -- How often (in seconds) to perform the probe
        periodSeconds: 3
        # -- Number of attempts
        failureThreshold: 40
      # -- Indicates whether the container is running
      liveness:
        # -- How often (in seconds) to perform the probe
        periodSeconds: 10
        # -- Indicates whether the container is ready to service requests
      readiness:
        # -- Number of seconds after the container has started before readiness probes are initiated
        initialDelaySeconds: 60
        # -- How often (in seconds) to perform the probe
        periodSeconds: 1

    # -- Number of deployment replicas
    replicas: 1
    # HPA configurations
    # -- Min replica count for HPA (https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/)
    minReplicas: 1
    # -- Max replica count for HPA (https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/)
    maxReplicas: 2
    # -- Average CPU utilization percentage for HPA
    cpuUtilizationPercentage: 75
    # -- Average memory utilization percentage for HPA
    memoryUtilizationPercentage: 75
    # -- Pod disruption budget configurations (https://kubernetes.io/docs/tasks/run-application/configure-pdb/)
    minAvailable: 1

    strategy:
      rollingUpdate:
        # -- The maximum number of pods that can be scheduled above the desired number of pods.
        maxSurge: 1
        # -- The maximum number of pods that can be unavailable during the update.
        maxUnavailable: 0

    # These are the minimum resource recommendations for running WSO2 Micro Integrator
    resources:
      requests:
        # -- The minimum amount of memory that should be allocated for a Pod
        memory: "512Mi"
        # -- The minimum amount of CPU that should be allocated for a Pod
        cpu: "500m"
      limits:
        # -- The maximum amount of memory that should be allocated for a Pod
        memory: "1Gi"
        # -- The maximum amount of CPU that should be allocated for a Pod
        cpu: "1000m"

      # JVM settings
      # These are the resource allocation configurations associated with the JVM
      jvm:
        memory:
          # -- The minimum amount of memory that should be allocated for the JVM
          xms: "512m"
          # -- The maximum amount of memory that should be allocated for the JVM
          xmx: "1024m"

    # -- Environment variables for the ICP deployment
    envs:

    # -- Set UNIX permissions over the startup scripts
    configMaps:
      entryPoint:
        defaultMode: "0407"

  # Integration Control Plane (ICP) 2.0 product configurations
  config:
    # -- ICP server port
    serverPort: 9445
    # -- ICP server host
    # serverHost: "0.0.0.0"
    # -- GraphQL API port
    graphqlPort: 9446
    # -- Observability API port
    observabilityPort: 9448
    # -- Auth API port
    authPort: 9447
    # -- Additional ICP ports exposed by the container
    additionalPorts:
      - name: icp-port-3
        port: 9447
      - name: icp-port-5
        port: 9449
    # -- Scheduler interval in seconds
    schedulerIntervalSeconds: 30
    # -- Refresh token cleanup interval in seconds
    # refreshTokenCleanupIntervalSeconds: 86400
    # -- Log level (DEBUG, INFO, WARN, ERROR)
    logLevel: "INFO"
    # -- Enable audit logging
    enableAuditLogging: true
    # -- Enable metrics
    enableMetrics: true
    # -- Authentication backend URL
    authBackendUrl: "https://localhost:9447"
    # -- Frontend JWT HMAC secret (at least 32 characters for HS256)
    frontendJwtHMACSecret: ""
    # -- Token expiry time in seconds
    # defaultTokenExpiryTime: 3600
    # -- Refresh token expiry time in seconds
    # refreshTokenExpiryTime: 604800
    # -- Enable refresh token rotation
    # enableRefreshTokenRotation: true
    # -- Maximum refresh tokens per user (0 = unlimited)
    # maxRefreshTokensPerUser: 10
    # -- Allow insecure TLS for MI artifacts API
    artifactsApiAllowInsecureTLS: false
    # -- Enable observability
    # observabilityEnabled: true
    # Credentials database configuration
    credentialsDb:
      # -- Credentials database type (h2, postgresql, mysql, mssql)
      # dbType: "h2"
      # -- Credentials database host
      # dbHost: "localhost"
      # -- Credentials database port
      # dbPort: 5432
      # -- Credentials database name
      # dbName: "credentialsdb"
      # -- Credentials database user
      # dbUser: "icp_user"
      # -- Credentials database password
      # dbPassword: "icp_password"
    # Primary database / storage configuration
    storage:
      # -- Heartbeat timeout in seconds
      # heartbeatTimeoutSeconds: 30
      # -- Database type (h2, mysql, mssql, postgresql)
      # dbType: "h2"
      # -- Database host
      # dbHost: "localhost"
      # -- Database port
      # dbPort: 3306
      # -- Database name
      # dbName: "icp_database"
      # -- Database user
      # dbUser: "root"
      # -- Database password
      # dbPassword: "my-secret-pw"
      # -- Maximum number of open connections
      # maxOpenConnections: 10
      # -- Minimum number of idle connections
      # minIdleConnections: 5
      # -- Maximum connection lifetime in seconds
      # maxConnectionLifeTime: 1800.0
    # OpenSearch configuration
    # opensearch:
    #   url: "https://localhost:9200"
    #   username: "admin"
    #   password: ""
    # SSO (OIDC) configuration
    sso:
      # -- Enable/Disable SSO authentication
      enabled: false
      # -- SSO issuer URL
      # issuer: ""
      # -- SSO authorization endpoint
      # authorizationEndpoint: ""
      # -- SSO token endpoint
      # tokenEndpoint: ""
      # -- SSO logout endpoint
      # logoutEndpoint: ""
      # -- SSO client ID
      # clientId: ""
      # -- SSO client secret
      # clientSecret: ""
      # -- SSO redirect URI
      # redirectUri: ""
      # -- SSO username claim
      # usernameClaim: "email"
      # -- SSO scopes
      # scopes:
      #   - "openid"
      #   - "email"
      #   - "profile"
    # Secure vault configuration
    secureVault:
      # -- Enable/Disable secure vault
      enabled: false
      # -- Encrypted secret values
      # secrets:
      #   secretJWTsecret: ""
      #   secCredsDbPassword: ""
      #   secDbPassword: ""
      #   ssoClientSecret: ""
      #   opensearchPassword: ""
