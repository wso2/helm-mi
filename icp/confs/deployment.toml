# ICP Server Configuration File
# This file contains all configurable parameters for the Integration Control Plane server

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
{{- if .Values.wso2.config.serverPort }}
serverPort = {{ .Values.wso2.config.serverPort }}
{{- end }}
{{- if .Values.wso2.config.serverHost }}
serverHost = {{ .Values.wso2.config.serverHost | quote }}
{{- end }}

# =============================================================================
# OPERATIONAL CONFIGURATION
# =============================================================================
{{- if .Values.wso2.config.schedulerIntervalSeconds }}
schedulerIntervalSeconds = {{ .Values.wso2.config.schedulerIntervalSeconds }}
{{- end }}
{{- if .Values.wso2.config.refreshTokenCleanupIntervalSeconds }}
refreshTokenCleanupIntervalSeconds = {{ .Values.wso2.config.refreshTokenCleanupIntervalSeconds }}
{{- end }}

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
{{- if .Values.wso2.config.logLevel }}
logLevel = {{ .Values.wso2.config.logLevel | quote }}
{{- end }}
enableAuditLogging = {{ .Values.wso2.config.enableAuditLogging | default false }}
enableMetrics = {{ .Values.wso2.config.enableMetrics | default false }}

# =============================================================================
# AUTHENTICATION BACKEND CONFIGURATION
# =============================================================================
{{- if .Values.wso2.config.authBackendUrl }}
authBackendUrl = {{ .Values.wso2.config.authBackendUrl | quote }}
{{- end }}

# =============================================================================
# AUTH SERVICE CONFIGURATION
# =============================================================================
{{- if .Values.wso2.config.secureVault.enabled }}
frontendJwtHMACSecret = "$secret{secretJWTsecret}"
{{- else }}
frontendJwtHMACSecret = {{ .Values.wso2.config.frontendJwtHMACSecret | quote }}
{{- end }}

# =============================================================================
# CREDENTIALS DATABASE CONFIGURATION
# =============================================================================
{{- if .Values.wso2.config.credentialsDb }}
{{- if .Values.wso2.config.credentialsDb.dbType }}
credentialsDbType = {{ .Values.wso2.config.credentialsDb.dbType | quote }}
{{- end }}
{{- if .Values.wso2.config.credentialsDb.dbHost }}
credentialsDbHost = {{ .Values.wso2.config.credentialsDb.dbHost | quote }}
{{- end }}
{{- if .Values.wso2.config.credentialsDb.dbPort }}
credentialsDbPort = {{ .Values.wso2.config.credentialsDb.dbPort }}
{{- end }}
{{- if .Values.wso2.config.credentialsDb.dbName }}
credentialsDbName = {{ .Values.wso2.config.credentialsDb.dbName | quote }}
{{- end }}
{{- if .Values.wso2.config.credentialsDb.dbUser }}
credentialsDbUser = {{ .Values.wso2.config.credentialsDb.dbUser | quote }}
{{- end }}
{{- if .Values.wso2.config.credentialsDb.dbPassword }}
{{- if .Values.wso2.config.secureVault.enabled }}
credentialsDbPassword = "$secret{secCredsDbPassword}"
{{- else }}
credentialsDbPassword = {{ .Values.wso2.config.credentialsDb.dbPassword | quote }}
{{- end }}
{{- end }}
{{- end }}

# Token expiry settings
{{- if .Values.wso2.config.defaultTokenExpiryTime }}
defaultTokenExpiryTime = {{ .Values.wso2.config.defaultTokenExpiryTime }}
{{- end }}
{{- if .Values.wso2.config.refreshTokenExpiryTime }}
refreshTokenExpiryTime = {{ .Values.wso2.config.refreshTokenExpiryTime }}
{{- end }}
enableRefreshTokenRotation = {{ .Values.wso2.config.enableRefreshTokenRotation | default false }}
{{- if hasKey .Values.wso2.config "maxRefreshTokensPerUser" }}
maxRefreshTokensPerUser = {{ .Values.wso2.config.maxRefreshTokensPerUser }}
{{- end }}

# =============================================================================
# LDAP CONFIGURATION
# =============================================================================
{{- if .Values.wso2.config.ldap }}
{{- if .Values.wso2.config.ldap.enabled }}
ldapUserStoreEnabled = {{ .Values.wso2.config.ldap.enabled }}
{{- end }}
{{- if .Values.wso2.config.ldap.hostName }}
ldapHostName = {{ .Values.wso2.config.ldap.hostName | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.port }}
ldapPort = {{ .Values.wso2.config.ldap.port }}
{{- end }}
{{- if .Values.wso2.config.ldap.connectionName }}
ldapConnectionName = {{ .Values.wso2.config.ldap.connectionName | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.connectionPassword }}
{{- if .Values.wso2.config.secureVault.enabled }}
ldapConnectionPassword = "$secret{ldapConnectionPassword}"
{{- else }}
ldapConnectionPassword = {{ .Values.wso2.config.ldap.connectionPassword | quote }}
{{- end }}
{{- end }}
{{- if .Values.wso2.config.ldap.userSearchBase }}
ldapUserSearchBase = {{ .Values.wso2.config.ldap.userSearchBase | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.userNameAttribute }}
ldapUserNameAttribute = {{ .Values.wso2.config.ldap.userNameAttribute | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.userSearchFilter }}
ldapUserSearchFilter = {{ .Values.wso2.config.ldap.userSearchFilter | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.userDNPattern }}
ldapUserDNPattern = {{ .Values.wso2.config.ldap.userDNPattern | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.displayNameAttribute }}
ldapDisplayNameAttribute = {{ .Values.wso2.config.ldap.displayNameAttribute | quote }}
{{- end }}
{{- if hasKey .Values.wso2.config.ldap "readGroups" }}
ldapReadGroups = {{ .Values.wso2.config.ldap.readGroups }}
{{- end }}
{{- if .Values.wso2.config.ldap.memberOfAttribute }}
ldapMemberOfAttribute = {{ .Values.wso2.config.ldap.memberOfAttribute | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.groupSearchBase }}
ldapGroupSearchBase = {{ .Values.wso2.config.ldap.groupSearchBase | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.groupNameAttribute }}
ldapGroupNameAttribute = {{ .Values.wso2.config.ldap.groupNameAttribute | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.groupSearchFilter }}
ldapGroupSearchFilter = {{ .Values.wso2.config.ldap.groupSearchFilter | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.membershipAttribute }}
ldapMembershipAttribute = {{ .Values.wso2.config.ldap.membershipAttribute | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.adminRoles }}
ldapAdminRoles = [{{ range .Values.wso2.config.ldap.adminRoles }}"{{ . }}", {{ end }}]
{{- end }}
{{- if .Values.wso2.config.ldap.sslEnabled }}
ldapSslEnabled = {{ .Values.wso2.config.ldap.sslEnabled }}
{{- end }}
{{- if .Values.wso2.config.ldap.trustStorePath }}
ldapTrustStorePath = {{ .Values.wso2.config.ldap.trustStorePath | quote }}
{{- end }}
{{- if .Values.wso2.config.ldap.trustStorePassword }}
{{- if .Values.wso2.config.secureVault.enabled }}
ldapTrustStorePassword = "$secret{ldapTrustStorePassword}"
{{- else }}
ldapTrustStorePassword = {{ .Values.wso2.config.ldap.trustStorePassword | quote }}
{{- end }}
{{- end }}
{{- end }}

# =============================================================================
# ENCRYPTED SECRETS CONFIGURATION
# =============================================================================
{{- if .Values.wso2.config.secureVault.enabled }}
[icp_server.secrets]
{{- if .Values.wso2.config.secureVault.secrets }}
{{- if .Values.wso2.config.secureVault.secrets.secretJWTsecret }}
secretJWTsecret = {{ .Values.wso2.config.secureVault.secrets.secretJWTsecret | quote }}
{{- end }}
{{- if .Values.wso2.config.secureVault.secrets.secCredsDbPassword }}
secCredsDbPassword = {{ .Values.wso2.config.secureVault.secrets.secCredsDbPassword | quote }}
{{- end }}
{{- if .Values.wso2.config.secureVault.secrets.secDbPassword }}
secDbPassword = {{ .Values.wso2.config.secureVault.secrets.secDbPassword | quote }}
{{- end }}
{{- end }}
{{- if and (.Values.wso2.config.sso) (.Values.wso2.config.sso.enabled) (.Values.wso2.config.secureVault.secrets.ssoClientSecret) }}
ssoClientSecret = {{ .Values.wso2.config.secureVault.secrets.ssoClientSecret | quote }}
{{- end }}
{{- if and (.Values.wso2.config.ldap) (.Values.wso2.config.secureVault.secrets.ldapConnectionPassword) }}
ldapConnectionPassword = {{ .Values.wso2.config.secureVault.secrets.ldapConnectionPassword | quote }}
{{- end }}
{{- if and (.Values.wso2.config.ldap) (.Values.wso2.config.secureVault.secrets.ldapTrustStorePassword) }}
ldapTrustStorePassword = {{ .Values.wso2.config.secureVault.secrets.ldapTrustStorePassword | quote }}
{{- end }}
{{- if and (.Values.wso2.config.opensearch) (.Values.wso2.config.secureVault.secrets.opensearchPassword) }}
opensearchPassword = {{ .Values.wso2.config.secureVault.secrets.opensearchPassword | quote }}
{{- end }}
{{- end }}

# =============================================================================
# SSO (OIDC) CONFIGURATION
# =============================================================================
{{- if and (.Values.wso2.config.sso) (.Values.wso2.config.sso.enabled) }}
ssoEnabled = true
{{- if .Values.wso2.config.sso.issuer }}
ssoIssuer = {{ .Values.wso2.config.sso.issuer | quote }}
{{- end }}
{{- if .Values.wso2.config.sso.authorizationEndpoint }}
ssoAuthorizationEndpoint = {{ .Values.wso2.config.sso.authorizationEndpoint | quote }}
{{- end }}
{{- if .Values.wso2.config.sso.tokenEndpoint }}
ssoTokenEndpoint = {{ .Values.wso2.config.sso.tokenEndpoint | quote }}
{{- end }}
{{- if .Values.wso2.config.sso.logoutEndpoint }}
ssoLogoutEndpoint = {{ .Values.wso2.config.sso.logoutEndpoint | quote }}
{{- end }}
{{- if .Values.wso2.config.sso.jwksUrl }}
ssoJwksUrl = {{ .Values.wso2.config.sso.jwksUrl | quote }}
{{- end }}
{{- if .Values.wso2.config.sso.clientId }}
ssoClientId = {{ .Values.wso2.config.sso.clientId | quote }}
{{- end }}
{{- if .Values.wso2.config.sso.clientSecret }}
{{- if .Values.wso2.config.secureVault.enabled }}
ssoClientSecret = "$secret{ssoClientSecret}"
{{- else }}
ssoClientSecret = {{ .Values.wso2.config.sso.clientSecret | quote }}
{{- end }}
{{- end }}
{{- if .Values.wso2.config.sso.redirectUri }}
ssoRedirectUri = {{ .Values.wso2.config.sso.redirectUri | quote }}
{{- end }}
{{- if .Values.wso2.config.sso.usernameClaim }}
ssoUsernameClaim = {{ .Values.wso2.config.sso.usernameClaim | quote }}
{{- end }}
{{- if .Values.wso2.config.sso.scopes }}
ssoScopes = [
    {{- range .Values.wso2.config.sso.scopes }}
    "{{ . }}",
    {{- end }}
]
{{- end }}
{{- if .Values.wso2.config.sso.allowInsecureTLS }}
ssoAllowInsecureTLS = {{ .Values.wso2.config.sso.allowInsecureTLS }}
{{- end }}
{{- end }}

# =============================================================================
# OPENSEARCH CONFIGURATION
# =============================================================================
{{- if .Values.wso2.config.opensearch }}
{{- if .Values.wso2.config.opensearch.url }}
opensearchUrl = {{ .Values.wso2.config.opensearch.url | quote }}
{{- end }}
{{- if .Values.wso2.config.opensearch.username }}
opensearchUsername = {{ .Values.wso2.config.opensearch.username | quote }}
{{- end }}
{{- if .Values.wso2.config.opensearch.password }}
{{- if .Values.wso2.config.secureVault.enabled }}
opensearchPassword = "$secret{opensearchPassword}"
{{- else }}
opensearchPassword = {{ .Values.wso2.config.opensearch.password | quote }}
{{- end }}
{{- end }}
{{- end }}

# =============================================================================
# FRONTEND URL CONFIGURATION (derived from hostname)
# =============================================================================
{{- if .Values.wso2.deployment.hostname }}
backendGraphqlEndpoint = "https://{{ .Values.wso2.deployment.hostname }}/graphql"
backendAuthBaseUrl = "https://{{ .Values.wso2.deployment.hostname }}/auth"
backendObservabilityEndpoint = "https://{{ .Values.wso2.deployment.hostname }}/icp/observability"
{{- end }}

# =============================================================================
# MI ARTIFACTS API CONFIGURATION
# =============================================================================
{{- if .Values.wso2.config.artifactsApiAllowInsecureTLS }}
artifactsApiAllowInsecureTLS = {{ .Values.wso2.config.artifactsApiAllowInsecureTLS }}
{{- end }}

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
[icp_server.storage]
{{- if .Values.wso2.config.storage }}
{{- if .Values.wso2.config.storage.deploymentType }}
deploymentType = {{ .Values.wso2.config.storage.deploymentType | quote }}
{{- end }}
{{- if .Values.wso2.config.storage.heartbeatTimeoutSeconds }}
heartbeatTimeoutSeconds = {{ .Values.wso2.config.storage.heartbeatTimeoutSeconds }}
{{- end }}
{{- if .Values.wso2.config.storage.dbType }}
dbType = {{ .Values.wso2.config.storage.dbType | quote }}
{{- end }}
{{- if .Values.wso2.config.storage.dbHost }}
dbHost = {{ .Values.wso2.config.storage.dbHost | quote }}
{{- end }}
{{- if .Values.wso2.config.storage.dbPort }}
dbPort = {{ .Values.wso2.config.storage.dbPort }}
{{- end }}
{{- if .Values.wso2.config.storage.dbName }}
dbName = {{ .Values.wso2.config.storage.dbName | quote }}
{{- end }}
{{- if .Values.wso2.config.storage.dbUser }}
dbUser = {{ .Values.wso2.config.storage.dbUser | quote }}
{{- end }}
{{- if .Values.wso2.config.storage.dbPassword }}
{{- if .Values.wso2.config.secureVault.enabled }}
dbPassword = "$secret{secDbPassword}"
{{- else }}
dbPassword = {{ .Values.wso2.config.storage.dbPassword | quote }}
{{- end }}
{{- end }}
{{- if .Values.wso2.config.storage.maxOpenConnections }}
maxOpenConnections = {{ .Values.wso2.config.storage.maxOpenConnections }}
{{- end }}
{{- if .Values.wso2.config.storage.minIdleConnections }}
minIdleConnections = {{ .Values.wso2.config.storage.minIdleConnections }}
{{- end }}
{{- if .Values.wso2.config.storage.maxConnectionLifeTime }}
maxConnectionLifeTime = {{ .Values.wso2.config.storage.maxConnectionLifeTime }}
{{- end }}
{{- end }}

{{- if .Values.wso2.config.secureVault.enabled }}
[icp_server.storage.secrets]
{{- if .Values.wso2.config.secureVault.secrets }}
{{- if .Values.wso2.config.secureVault.secrets.secDbPassword }}
secDbPassword = {{ .Values.wso2.config.secureVault.secrets.secDbPassword | quote }}
{{- end }}
{{- end }}
{{- end }}

[[ballerina.log.modules]]
name = "wso2/icp_server"
level = {{ .Values.wso2.config.logLevel | default "INFO" | quote }}

[ballerina.http.traceLogAdvancedConfig]
console = false
