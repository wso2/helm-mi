{{- if .Values.wso2.gatewayAPI.backendTLS.enabled }}
# BackendTLSPolicy: ICP serves all content over HTTPS on a single port,
# so the policy targets the main service directly (no split services needed)
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-icp-backend-tls
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: {{ template "resource.prefix" . }}-{{ .Release.Name }}
  validation:
    # hostname must match the CN/SAN in the backend's TLS certificate (WSO2 default: localhost)
    hostname: {{ .Values.wso2.gatewayAPI.backendTLS.hostname | default "localhost" }}
    # CA certificate used to verify the backend's TLS certificate
    caCertificateRefs:
      - name: {{ if .Values.wso2.gatewayAPI.backendTLS.caCertConfigMap }}{{ .Values.wso2.gatewayAPI.backendTLS.caCertConfigMap }}{{ else }}{{ template "resource.prefix" . }}-{{ .Release.Name }}-icp-backend-ca{{ end }}
        kind: ConfigMap
        group: ""
---
{{- end }}
{{- if eq .Values.wso2.gatewayAPI.gatewayClassName "envoy" }}
# BackendTrafficPolicy: Envoy Gateway-specific policy for rate limiting and/or session affinity.
# This resource is only created when gatewayClassName is "envoy" and either rate limiting
# is enabled or multiple replicas require session affinity.
#
# Session Affinity (loadBalancer.consistentHash):
#   Automatically enabled when running ICP with multiple replicas (replicas > 1).
#   ICP uses server-side HTTP sessions for dashboard login state, CSRF tokens,
#   and SSO flow state. Without session affinity, users may get logged out or
#   encounter CSRF errors when requests land on different pods.
#   Implementation uses Envoy Gateway's ConsistentHash load balancer with cookie-based hashing.
#   Not needed for single-replica deployments or non-Envoy gateways.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-icp-backend-traffic
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-icp-httproute
  {{- if gt (int .Values.wso2.deployment.replicas) 1 }}
  loadBalancer:
    type: ConsistentHash
    consistentHash:
      type: Cookie
      cookie:
        name: {{ .Values.wso2.gatewayAPI.sessionAffinity.cookieName | default "ICP_AFFINITY" }}
        ttl: {{ .Values.wso2.gatewayAPI.sessionAffinity.cookieTTL | default "3600s" }}
  {{- end }}
  {{- if .Values.wso2.gatewayAPI.ratelimit.enabled }}
  rateLimit:
    local:
      rules:
        - limit:
            requests: {{ .Values.wso2.gatewayAPI.ratelimit.requestsPerSecond }}
            unit: Second
          clientSelectors:
            - sourceCIDR: 0.0.0.0/0
  {{- end }}
{{- end }}
{{- end }}
