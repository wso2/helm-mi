apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-icp-httproute
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "icp.labels" . | indent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.wso2.gatewayAPI.gatewayName }}
      namespace: {{ .Values.wso2.gatewayAPI.gatewayNamespace | default "default" }}
  hostnames:
    - {{ .Values.wso2.deployment.hostname | quote }}
  rules:
    # ICP Dashboard and all APIs (single HTTPS port)
    # URLRewrite rewrites the hostname to match the backend's TLS certificate CN/SAN
    # (set via BackendTLSPolicy). ICP's Jetty server enforces Host == SNI.
    - matches:
        - path:
            type: PathPrefix
            value: /
      {{- if .Values.wso2.gatewayAPI.backendTLS.enabled }}
      filters:
        - type: URLRewrite
          urlRewrite:
            hostname: {{ .Values.wso2.gatewayAPI.backendTLS.hostname | default "localhost" }}
      {{- end }}
      backendRefs:
        - name: {{ template "resource.prefix" . }}-{{ .Release.Name }}
          port: {{ .Values.wso2.config.serverPort }}
{{- end }}
