# This permits a Gateway in a different namespace to read the TLS Secret
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ template "resource.prefix" . }}-{{ .Release.Name }}-tls-auth
  namespace: {{ .Release.Namespace }} # Must match the Secret namespace
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: {{ .Values.wso2.gatewayAPI.gatewayNamespace | default "default" }}
  to:
    - group: ""
      kind: Secret
      name: {{ printf "%s-%s-icp-gateway-tls" (include "resource.prefix" .) .Release.Name }}
    - group: ""
      kind: Service
      name: {{ printf "%s-%s" (include "resource.prefix" .) .Release.Name }}
{{- end }}
